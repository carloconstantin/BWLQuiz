<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>NETZINT NOC · Incident #2026-0517</title>
<style>
  :root{
    --bg:#04070D; --bg-soft:#0A1320; --panel:#0E1A2E; --panel-2:#142640;
    --line:#1B3458; --line-soft:#142133; --text:#D8E4F2; --muted:#7892AC;
    --dim:#4D6B89; --accent:#3FA7E1; --accent-strong:#5BBFFF;
    --ok:#3DDB8F; --warn:#FFB547; --err:#FF5A6E; --magenta:#C087F2;
    --mono:'JetBrains Mono','SFMono-Regular','Menlo','Consolas','Liberation Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg)}
  body{
    color:var(--text); font-family:var(--mono); font-size:13px; line-height:1.5;
    -webkit-font-smoothing:antialiased; min-height:100vh; min-height:100dvh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background-image:
      radial-gradient(ellipse at 30% -10%, rgba(63,167,225,.10), transparent 60%),
      radial-gradient(ellipse at 80% 110%, rgba(192,135,242,.07), transparent 50%);
  }
  .app{max-width:560px;margin:0 auto;padding:14px 12px 28px;position:relative}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);mix-blend-mode:overlay}

  .topbar{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:8px 12px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(20,38,64,.85),rgba(14,26,46,.85));border-radius:8px;backdrop-filter:blur(6px);margin-bottom:12px;font-size:11px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:.6px}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .sla{display:flex;align-items:center;gap:6px;color:var(--muted);justify-content:center}
  .sla .label{font-size:10px;letter-spacing:.6px}
  .sla .clock{color:var(--warn);font-weight:700;font-size:13px;letter-spacing:.5px}
  .sla .clock.crit{color:var(--err);animation:blink 1s infinite}
  .sla .clock.ok{color:var(--ok)}
  @keyframes blink{50%{opacity:.4}}
  .conn{display:flex;align-items:center;gap:6px;color:var(--muted)}
  .conn .led{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

  .screen{position:relative}
  .fade-in{animation:fadeIn .25s ease both}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .boot{border:1px solid var(--line);border-radius:8px;padding:18px 14px;background:linear-gradient(180deg,rgba(20,38,64,.45),rgba(10,19,32,.7));min-height:55vh}
  .boot pre{font-family:var(--mono);font-size:11.5px;line-height:1.65;white-space:pre-wrap;color:var(--text)}
  .boot .ok{color:var(--ok)} .boot .warn{color:var(--warn)} .boot .err{color:var(--err)} .boot .info{color:var(--accent)} .boot .dim{color:var(--dim)} .boot .out{color:var(--text)}
  .boot-action{display:flex;gap:10px;margin-top:18px}

  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--text);font-family:var(--mono);font-size:14px;font-weight:600;cursor:pointer;transition:all .12s ease;letter-spacing:.4px;-webkit-tap-highlight-color:transparent}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:linear-gradient(180deg,#3FA7E1,#2080BB);color:#021022;border-color:#5BBFFF;animation:glow 2s infinite}
  .btn.primary:hover{filter:brightness(1.1)}
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(63,167,225,.45)}50%{box-shadow:0 0 0 6px rgba(63,167,225,0)}}
  .btn.danger{background:linear-gradient(180deg,#FF5A6E,#C32338);color:#fff;border-color:#FF8B9C;animation:glow-r 1.5s infinite}
  @keyframes glow-r{0%,100%{box-shadow:0 0 0 0 rgba(255,90,110,.5)}50%{box-shadow:0 0 0 8px rgba(255,90,110,0)}}
  .btn.ghost{border-color:var(--line);color:var(--muted)}

  .alert-wrap{border:1px solid var(--err);border-radius:8px;overflow:hidden;background:linear-gradient(180deg,rgba(80,20,28,.65),rgba(20,12,18,.95));box-shadow:0 0 0 1px rgba(255,90,110,.2),0 0 36px rgba(255,90,110,.18);animation:alertPulse 1.4s ease-in-out infinite}
  @keyframes alertPulse{0%,100%{box-shadow:0 0 0 1px rgba(255,90,110,.2),0 0 36px rgba(255,90,110,.18)}50%{box-shadow:0 0 0 1px rgba(255,90,110,.45),0 0 48px rgba(255,90,110,.32)}}
  .alert-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(255,90,110,.15);border-bottom:1px solid rgba(255,90,110,.35);font-size:11px;letter-spacing:.7px}
  .alert-head .left{color:var(--err);font-weight:700}
  .alert-head .right{color:var(--muted)}
  .alert-body{padding:14px 14px 4px}
  .alert-body h1{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1.35;color:var(--text);margin-bottom:10px;letter-spacing:-.1px}
  .meta{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12px;padding:8px 0 10px}
  .meta dt{color:var(--muted)} .meta dd{color:var(--text)} .meta .err{color:var(--err);font-weight:700}
  .alert-actions{padding:10px 14px 14px}

  .cockpit{display:flex;flex-direction:column;gap:10px}
  .panel{border:1px solid var(--line);background:linear-gradient(180deg,rgba(20,38,64,.45),rgba(10,19,32,.55));border-radius:8px;overflow:hidden}
  .panel-head{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid var(--line-soft);background:rgba(20,38,64,.5);font-size:10px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted)}
  .panel-head .id{color:var(--accent);font-weight:700}
  .panel-body{padding:10px 12px;font-size:12.5px}

  .term{background:#000;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .term-head{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#0A1320;border-bottom:1px solid var(--line);font-size:10px;letter-spacing:.6px;color:var(--muted)}
  .term-head .dots{display:flex;gap:4px}
  .term-head .dots span{width:8px;height:8px;border-radius:50%;display:inline-block}
  .term-head .dots .r{background:#FF5A6E} .term-head .dots .y{background:#FFB547} .term-head .dots .g{background:#3DDB8F}
  .term-body{padding:10px 12px;font-family:var(--mono);font-size:11.5px;line-height:1.55;min-height:130px;max-height:240px;overflow:auto;white-space:pre-wrap}
  .term-body .prompt{color:var(--ok)} .term-body .cmd{color:var(--text)} .term-body .out{color:var(--muted)} .term-body .err{color:var(--err)} .term-body .warn{color:var(--warn)} .term-body .info{color:var(--accent)} .term-body .dim{color:var(--dim)} .term-body .ok{color:var(--ok)}

  .net{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .node{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line-soft);border-radius:6px;background:rgba(10,19,32,.6);font-size:11.5px;color:var(--muted);transition:all .25s ease}
  .node .ico{font-size:11px;color:var(--dim)}
  .node .name{flex:1;letter-spacing:.3px;color:var(--text)}
  .node .pill{font-size:9.5px;padding:2px 6px;border-radius:99px;letter-spacing:.6px;font-weight:700;background:rgba(61,219,143,.12);color:var(--ok);border:1px solid rgba(61,219,143,.3)}
  .node.fail .pill{background:rgba(255,90,110,.12);color:var(--err);border-color:rgba(255,90,110,.4)}
  .node.recovering .pill{background:rgba(255,181,71,.1);color:var(--warn);border-color:rgba(255,181,71,.4)}
  .node.fail{border-color:rgba(255,90,110,.4)} .node.recovering{border-color:rgba(255,181,71,.4)} .node.ok{border-color:rgba(61,219,143,.25)}
  .node.fail .ico{color:var(--err)} .node.ok .ico{color:var(--ok)} .node.recovering .ico{color:var(--warn);animation:blink 1s infinite}

  .decision{border:1px solid var(--accent);border-radius:8px;overflow:hidden;background:linear-gradient(180deg,rgba(63,167,225,.10),rgba(20,38,64,.45));box-shadow:0 0 0 1px rgba(63,167,225,.18)}
  .decision-head{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--line);font-size:10px;letter-spacing:.6px;color:var(--accent);background:rgba(63,167,225,.06)}
  .decision-head .src{color:var(--muted)} .decision-head .kind{font-weight:700}
  .decision-body{padding:12px}
  .qtitle{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.4;font-family:var(--mono)}
  .qsub{font-size:12.5px;color:var(--muted);margin-bottom:12px;line-height:1.55}
  .opts{display:flex;flex-direction:column;gap:6px}
  .opt{text-align:left;background:#06101F;border:1px solid var(--line-soft);border-radius:6px;padding:10px 12px;color:var(--text);cursor:pointer;display:flex;gap:10px;align-items:flex-start;font-family:var(--mono);font-size:12.5px;line-height:1.45;transition:all .12s ease;-webkit-tap-highlight-color:transparent}
  .opt:hover{border-color:var(--accent);background:#0A1830}
  .opt .key{flex-shrink:0;width:22px;height:22px;border-radius:4px;background:rgba(63,167,225,.15);color:var(--accent);font-family:var(--mono);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border:1px solid rgba(63,167,225,.3)}
  .opt.disabled{cursor:default;opacity:.6}
  .opt.disabled:hover{border-color:var(--line-soft);background:#06101F}
  .opt.correct{border-color:var(--ok);background:rgba(61,219,143,.06)}
  .opt.correct .key{background:rgba(61,219,143,.2);color:var(--ok);border-color:var(--ok)}
  .opt.wrong{border-color:var(--err);background:rgba(255,90,110,.06)}
  .opt.wrong .key{background:rgba(255,90,110,.2);color:var(--err);border-color:var(--err)}

  .feedback{margin-top:12px;padding:10px 12px;border-radius:6px;font-size:12px;line-height:1.55;background:rgba(63,167,225,.06);border-left:3px solid var(--accent)}
  .feedback.good{background:rgba(61,219,143,.06);border-left-color:var(--ok)}
  .feedback.bad{background:rgba(255,90,110,.06);border-left-color:var(--err)}
  .feedback .label{display:block;font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .feedback.good .label{color:var(--ok)} .feedback.bad .label{color:var(--err)}

  .incoming{border:1px solid var(--magenta);background:linear-gradient(180deg,rgba(192,135,242,.10),rgba(20,38,64,.45));box-shadow:0 0 0 1px rgba(192,135,242,.15)}
  .incoming .decision-head{background:rgba(192,135,242,.06);color:var(--magenta);border-bottom-color:rgba(192,135,242,.3)}

  .progress-wrap{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted);padding:0 2px}
  .progress-track{flex:1;height:3px;background:var(--line);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--ok));transition:width .35s ease;border-radius:99px}

  .logs{border:1px solid var(--line-soft);border-radius:6px;background:#06101F;padding:6px 8px;font-family:var(--mono);font-size:10px;color:var(--muted);height:64px;overflow:hidden;position:relative;line-height:1.4}
  .logs::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(6,16,31,.85),transparent 30%,transparent 70%,rgba(6,16,31,.85))}
  .logs .ln{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .logs .ln .t{color:var(--dim)} .logs .ln .ok{color:var(--ok)} .logs .ln .info{color:var(--accent)} .logs .ln .warn{color:var(--warn)} .logs .ln .err{color:var(--err)}

  .result{border:1px solid var(--ok);border-radius:8px;overflow:hidden;background:linear-gradient(180deg,rgba(61,219,143,.10),rgba(10,19,32,.6));box-shadow:0 0 0 1px rgba(61,219,143,.2),0 0 40px rgba(61,219,143,.12)}
  .result.partial{border-color:var(--warn);background:linear-gradient(180deg,rgba(255,181,71,.08),rgba(10,19,32,.6));box-shadow:0 0 0 1px rgba(255,181,71,.2),0 0 30px rgba(255,181,71,.1)}
  .result.fail{border-color:var(--err);background:linear-gradient(180deg,rgba(255,90,110,.08),rgba(10,19,32,.6));box-shadow:0 0 0 1px rgba(255,90,110,.2),0 0 30px rgba(255,90,110,.1)}
  .result-head{padding:10px 14px;font-size:10px;letter-spacing:.6px;color:var(--ok);border-bottom:1px solid rgba(61,219,143,.3);background:rgba(61,219,143,.06);text-transform:uppercase;display:flex;justify-content:space-between}
  .result.partial .result-head{color:var(--warn);background:rgba(255,181,71,.06);border-bottom-color:rgba(255,181,71,.3)}
  .result.fail .result-head{color:var(--err);background:rgba(255,90,110,.06);border-bottom-color:rgba(255,90,110,.3)}
  .result-body{padding:14px}
  .ascii{font-family:var(--mono);font-size:10px;line-height:1.05;color:var(--ok);white-space:pre;text-align:center;margin:0 auto 10px;opacity:.95;overflow-x:auto}
  .result.partial .ascii{color:var(--warn)} .result.fail .ascii{color:var(--err)}
  .result h2{text-align:center;font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-.2px}
  .result .verdict{text-align:center;font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:14px}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
  .stat{border:1px solid var(--line);border-radius:6px;padding:10px 8px;background:rgba(10,19,32,.6);text-align:center}
  .stat .v{font-size:18px;font-weight:700;color:var(--accent);font-family:var(--mono);display:block;line-height:1}
  .stat.ok .v{color:var(--ok)} .stat.warn .v{color:var(--warn)} .stat.err .v{color:var(--err)} .stat.partial .v{color:var(--warn)}
  .stat .l{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:6px;display:block}
  .code-box{margin-top:6px;background:#000;border:1px solid var(--accent);border-radius:6px;padding:14px 12px;text-align:center;box-shadow:inset 0 0 24px rgba(63,167,225,.18)}
  .code-box .clabel{font-size:9.5px;color:var(--accent);letter-spacing:.7px;margin-bottom:6px;text-transform:uppercase}
  .code-box .code{font-size:22px;color:var(--text);letter-spacing:3px;font-weight:700;font-family:var(--mono)}
  .reveal{background:rgba(63,167,225,.06);border:1px solid var(--line);border-radius:6px;padding:10px 12px;font-size:12px;line-height:1.6;margin:14px 0}
  .reveal .label{display:block;font-size:9.5px;color:var(--accent);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px}
  .actions{display:flex;gap:8px;margin-top:14px}
  .foot{text-align:center;color:var(--dim);font-size:9.5px;margin-top:18px;letter-spacing:.4px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><span class="dot"></span><span class="name" id="brandText">NETZINT NOC</span></div>
    <div class="sla"><span class="label">SLA</span><span class="clock" id="slaClock">--:--</span></div>
    <div class="conn"><span class="led" id="connLed"></span><span id="connText">LIVE</span></div>
  </div>
  <div class="screen" id="screen"></div>
  <div class="foot">NETZINT GMBH · Schul-IT · BWL-Vortrag · Carlo Grötzinger</div>
</div>
<script>
"use strict";

const state = {
  step: 0, score: 0, log: [], sla: 300, slaInterval: null,
  startTs: 0, termHistory: [],
  nodes: [
    { id:"router", name:"Router · Schule",   icon:"[ROU]", status:"ok" },
    { id:"switch", name:"Switch · Core",     icon:"[SW1]", status:"ok" },
    { id:"ad",     name:"AD-Server (LDAP)",  icon:"[ADS]", status:"fail" },
    { id:"dhcp",   name:"DHCP-Server",       icon:"[DHC]", status:"ok" },
    { id:"web",    name:"WLAN-Controller",   icon:"[WLC]", status:"ok" },
    { id:"net",    name:"Netzint NOC",       icon:"[NOC]", status:"ok" },
  ],
};

const ticket = {
  id: "INC-2026-0517",
  client: "Gewerbeschule Freiburg",
  category: "Schul-IT / Authentication",
  severity: "P1 · KRITISCH",
  opened: "Mo · 07:55:14 CET",
  reporter: "S. Müller (Schulleitung)",
  summary: "Schüler und Lehrer können sich an keinem Schulrechner mehr anmelden. Mathematik-Klausur startet um 08:00.",
};

const steps = [
  {
    kind:"DIAG", panelKind:"decision", src:"$ root@noc-jumphost",
    title:"Welcher Befehl liefert dir die schnellste Diagnose?",
    sub:"Du hast SSH auf deinen Jumphost. AD-Server antwortet nicht auf Logins.",
    options:[
      { t:"ping 8.8.8.8", ok:false,
        fb:"Das prüft nur deine Internetleitung, nicht die Anmeldungen.",
        term:[
          {c:"prompt",s:"root@noc-jumphost:~# "},
          {c:"cmd",s:"ping 8.8.8.8"},
          {c:"out",s:"PING 8.8.8.8 (8.8.8.8) 56(84) bytes of data."},
          {c:"out",s:"64 bytes from 8.8.8.8: icmp_seq=1 ttl=118 time=12.4 ms"},
          {c:"warn",s:"# Leitung ist da. Aber die Schüler kommen nicht rein."},
        ]},
      { t:"systemctl status sssd", ok:true,
        fb:"Richtig. SSSD ist der Dienst, der gegen den AD authentifiziert. Wenn der hängt, kommen keine Logins durch.",
        term:[
          {c:"prompt",s:"root@noc-jumphost:~# "},
          {c:"cmd",s:"ssh adserver-fr01 'systemctl status sssd'"},
          {c:"out",s:"● sssd.service - System Security Services Daemon"},
          {c:"out",s:"   Loaded: loaded (/usr/lib/systemd/system/sssd.service; enabled)"},
          {c:"err",s:"   Active: failed (Result: exit-code) since Mo 07:52:08 CET"},
          {c:"err",s:"   Main PID: 1287 (code=exited, status=1/FAILURE)"},
          {c:"dim",s:"   ... be_ldap: ldap_connect failed"},
          {c:"info",s:"# Treffer. LDAP-Daemon ist down."},
        ]},
      { t:"cat /etc/passwd", ok:false,
        fb:"Lokale User-Datei. Hat nichts mit AD-Logins zu tun.",
        term:[
          {c:"prompt",s:"root@noc-jumphost:~# "},
          {c:"cmd",s:"cat /etc/passwd | head -3"},
          {c:"out",s:"root:x:0:0:root:/root:/bin/bash"},
          {c:"out",s:"daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin"},
          {c:"warn",s:"# /etc/passwd ist nur lokal. AD-User stehen da nicht drin."},
        ]},
    ],
  },
  {
    kind:"BWL", panelKind:"incoming", src:"Teams · Direktnachricht",
    from:"Frau Müller (Schulleitung)",
    title:"\"Carlo, schnell – mit wem habe ich eigentlich den Wartungsvertrag?\"",
    sub:"Sie braucht die Info für die Versicherungsmeldung – jetzt.",
    options:[
      { t:"Mit Maurice Cazautet (Geschäftsführer) persönlich.", ok:false,
        fb:"Nein. Der GF handelt für die GmbH, ist aber nicht selbst Vertragspartner.",
        term:[
          {c:"prompt",s:"chat:~$ "},
          {c:"cmd",s:"reply 'Mit Maurice Cazautet'"},
          {c:"warn",s:"... Versicherung lehnt ab. Verträge laufen mit der GmbH."},
        ]},
      { t:"Mit der Netzint GmbH als juristischer Person.", ok:true,
        fb:"Korrekt. Eine GmbH ist eine eigene Rechtspersönlichkeit. Stammkapital ≥ 25.000 €.",
        term:[
          {c:"prompt",s:"chat:~$ "},
          {c:"cmd",s:"reply 'Mit der Netzint GmbH (jur. Person)'"},
          {c:"ok",s:">>> Frau Müller: 'Perfekt, danke.'"},
        ]},
      { t:"Mit dem Techniker, der vor Ort war.", ok:false,
        fb:"Nein. Verträge laufen mit der GmbH, nicht mit einzelnen Mitarbeitern.",
        term:[
          {c:"prompt",s:"chat:~$ "},
          {c:"cmd",s:"reply 'Mit dem letzten Techniker'"},
          {c:"warn",s:"... Frau Müller: 'Bist du dir sicher?'"},
        ]},
    ],
  },
  {
    kind:"DIAG", panelKind:"decision", src:"$ root@adserver-fr01",
    title:"Welche Zeile aus /var/log/sssd ist die Ursache?",
    sub:"Logs sind im Terminal. Pick die relevante Zeile.",
    options:[
      { t:"DEBUG be_ldap: enumeration request received", ok:false,
        fb:"DEBUG ist nur Status-Rauschen. Suche nach ERROR oder FAIL.",
        term:[
          {c:"prompt",s:"root@adserver-fr01:~# "},
          {c:"cmd",s:"journalctl -u sssd -n 6 --no-pager"},
          {c:"dim",s:"07:51:59 sssd[1287]: be_ldap: enumeration request received"},
          {c:"warn",s:"# DEBUG-Rauschen. Die echte Ursache steckt darunter."},
        ]},
      { t:"WARN sssd: cache refresh in 3600s", ok:false,
        fb:"Cache-Refresh ist Routine. Der eigentliche Crash ist eine andere Zeile.",
        term:[

const $ = s => document.querySelector(s);
function el(h){ const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstChild; }
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function typeInto(target, lines, opts={}){
  const speed = opts.speed ?? 6;
  const linePause = opts.linePause ?? 80;
  for(const line of lines){
    const span = document.createElement('div');
    if(line.c) span.className = line.c;
    target.appendChild(span);
    if(opts.instant){
      span.textContent = line.s;
    } else {
      for(let i=0;i<line.s.length;i++){
        span.textContent += line.s[i];
        await delay(speed);
      }
    }
    target.scrollTop = target.scrollHeight;
    await delay(linePause);
  }
}

function fmtTime(s){ if(s<0)s=0; const m=Math.floor(s/60),ss=s%60; return `${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}` }
function startSLA(){
  state.startTs = Date.now();
  state.slaInterval = setInterval(()=>{
    state.sla -= 1;
    const c = $('#slaClock');
    c.textContent = fmtTime(state.sla);
    c.classList.toggle('crit', state.sla <= 60 && state.sla > 0);
    if(state.sla <= 0){ c.textContent="00:00"; clearInterval(state.slaInterval); state.slaInterval=null; }
  }, 1000);
}
function stopSLA(){
  if(state.slaInterval){ clearInterval(state.slaInterval); state.slaInterval=null; }
  const c = $('#slaClock'); c.classList.remove('crit'); c.classList.add('ok');
}

const LOG_TEMPLATES = [
  { c:"info", t:["DHCP lease renewed for client {ip}","DNS query A {host}.school.local resolved","Switch port {p} link UP gigE","SNMP poll OK from monitoring","WiFi client associated SSID 'Schule-LAN'"] },
  { c:"ok",   t:["systemd-timesyncd synchronized to time server","AD replication healthy across 2 DCs","BackupExec snapshot completed"] },
  { c:"warn", t:["High latency to dc02.school.local (180ms)","Switch port {p} flapping x3","WLAN client roaming above threshold"] },
  { c:"err",  t:["SSSD: LDAP timeout reading user data","Auth attempt failed for user '{u}' on host {host}"] },
];
const HOSTS = ["pc-r12-04","laptop-lehrer","ws-lab2-09","ws-mathlab-01","admin-pc"];
const USERS = ["mueller","schmidt","azubi.lina","klasse.fi24"];
function rndLogLine(){
  const t = LOG_TEMPLATES[Math.floor(Math.random()*LOG_TEMPLATES.length)];
  const tpl = t.t[Math.floor(Math.random()*t.t.length)];
  return { c:t.c, s: tpl
    .replace("{ip}", `10.42.${Math.floor(Math.random()*5)}.${Math.floor(Math.random()*250)+1}`)
    .replace("{host}", HOSTS[Math.floor(Math.random()*HOSTS.length)])
    .replace("{u}", USERS[Math.floor(Math.random()*USERS.length)])
    .replace("{p}", `gi0/${Math.floor(Math.random()*24)+1}`) };
}
let logFeedInterval = null;
function startLogFeed(targetSel){
  const t = $(targetSel); if(!t) return;
  function tick(){
    const now = new Date();
    const ts = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
    const line = rndLogLine();
    const div = document.createElement('div');
    div.className = "ln";
    div.innerHTML = `<span class="t">${ts}</span> <span class="${line.c}">${line.s}</span>`;
    t.appendChild(div);
    while(t.children.length>16) t.removeChild(t.firstChild);
    t.scrollTop = t.scrollHeight;
  }
  for(let i=0;i<6;i++) tick();
  logFeedInterval = setInterval(tick, 1400+Math.random()*900);
}
function stopLogFeed(){ if(logFeedInterval){ clearInterval(logFeedInterval); logFeedInterval=null; } }

function renderCockpit(){
  const s = steps[state.step];
  const pct = Math.round((state.step/steps.length)*100);
  screen.innerHTML='';
  $('#brandText').textContent = `NETZINT NOC · ${ticket.id}`;
  const node = el(`
    <div class="cockpit fade-in">
      <div class="progress-wrap">
        <span>${ticket.id}</span>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span>${state.step+1}/${steps.length}</span>
      </div>
      <div class="panel">
        <div class="panel-head"><span>NETWORK STATUS</span><span class="id">SCHULE-FR01</span></div>
        <div class="panel-body"><div class="net" id="net"></div></div>
      </div>
      <div class="term">
        <div class="term-head">
          <span class="dots"><span class="r"></span><span class="y"></span><span class="g"></span></span>
          <span>${s.src}</span>
        </div>
        <div class="term-body" id="termBody"></div>
      </div>
      <div class="${s.panelKind==='incoming' ? 'decision incoming' : 'decision'}" id="decision" style="display:none">
        <div class="decision-head">
          <span class="kind">${s.panelKind==='incoming' ? 'INCOMING MESSAGE' : (s.kind==='DIAG'?'DIAGNOSE-ENTSCHEIDUNG':'BWL · FRAGE')}</span>
          <span class="src">${s.from ? '@'+s.from : s.src}</span>
        </div>
        <div class="decision-body">
          <h3 class="qtitle">${s.title}</h3>
          <p class="qsub">${s.sub}</p>
          <div class="opts" id="opts"></div>
          <div id="fb"></div>
          <div id="nextRow" style="display:none;margin-top:12px">
            <button class="btn primary" id="next">${state.step+1<steps.length?'WEITER →':'INCIDENT ABSCHLIESSEN →'}</button>
          </div>
        </div>
      </div>
      <div class="logs" id="bgLog"></div>
    </div>
  `);
  screen.appendChild(node);
  renderNodes();
  if(!logFeedInterval) startLogFeed('#bgLog');
  const term = $('#termBody');
  state.termHistory.forEach(l=>{
    const d=document.createElement('div'); d.className=l.c; d.textContent=l.s; term.appendChild(d);
  });
  term.scrollTop = term.scrollHeight;
  (async ()=>{
    const intro = state.step === 0
      ? [
          { c:"info", s:"# Eingehendes Ticket: " + ticket.id },
          { c:"prompt", s:"root@noc-jumphost:~# " },
          { c:"cmd", s:"# Erstdiagnose – wo schaust du als erstes?" },
        ]
      : [
          { c:"dim", s:"---" },
          { c:"info", s:`# Schritt ${state.step+1}/${steps.length}` },
        ];
    await typeInto(term, intro, { speed:3, linePause:60 });
    state.termHistory.push(...intro);
    $('#decision').style.display='block';
    renderOptions();
  })();
}

function renderNodes(){
  const c = $('#net'); if(!c) return; c.innerHTML='';
  state.nodes.forEach(n=>{
    const p = n.status==='fail'?'FAIL':n.status==='recovering'?'RECOVER':'OK';
    c.appendChild(el(`<div class="node ${n.status}"><span class="ico">${n.icon}</span><span class="name">${n.name}</span><span class="pill">${p}</span></div>`));
  });
}

function renderOptions(){
  const s = steps[state.step]; const opts = $('#opts'); opts.innerHTML='';
  const keys = ['A','B','C','D'];
  s.options.forEach((opt, idx)=>{
    const b = el(`<button class="opt" data-idx="${idx}"><span class="key">${keys[idx]}</span><span>${opt.t}</span></button>`);
    b.addEventListener('click', ()=>handleAnswer(idx));
    opts.appendChild(b);
  });
}

async function handleAnswer(idx){
  const s = steps[state.step];
  const chosen = s.options[idx];
  if(chosen.ok) state.score++;
  state.log.push({ step:state.step, idx, ok:chosen.ok });
  document.querySelectorAll('#opts .opt').forEach((b,i)=>{
    b.classList.add('disabled');
    if(s.options[i].ok) b.classList.add('correct');
    if(i===idx && !s.options[i].ok) b.classList.add('wrong');
  });
  const term = $('#termBody');
  await typeInto(term, chosen.term, { speed:5, linePause:70 });
  state.termHistory.push(...chosen.term);
  const fb = $('#fb');
  fb.innerHTML = `<div class="feedback ${chosen.ok?'good':'bad'}"><span class="label">${chosen.ok?'OPERATOR LOG · OK':'OPERATOR LOG · RETRY'}</span><span>${chosen.fb}</span></div>`;
  if(chosen.ok){
    if(state.step===2){ const ad=state.nodes.find(n=>n.id==='ad'); if(ad){ ad.status='recovering'; renderNodes(); } }
    if(state.step===4){ const ad=state.nodes.find(n=>n.id==='ad'); if(ad){ ad.status='ok'; renderNodes(); } }
  }
  $('#nextRow').style.display='block';
  $('#next').onclick = ()=>{
    state.step++;
    if(state.step >= steps.length){ renderResult(); } else { renderCockpit(); }
  };
}

function makeCode(score){ return `NZ${score}-${Math.random().toString(36).slice(2,6).toUpperCase()}` }

function renderResult(){
  stopSLA(); stopLogFeed();
  const elapsed = 300 - state.sla;
  const score = state.score; const max = steps.length;
  let tier = 'fail';
  if(score===max) tier='ok'; else if(score>=3) tier='partial';
  if(score===max) state.nodes.forEach(n=>n.status='ok');

  const ascii = tier==='ok'
    ? "  ____  _____ ____   ___  _ __     __ _____ ____  \n |  _ \\| ____/ ___| / _ \\| |\\ \\   / /| ____|  _ \\ \n | |_) |  _| \\___ \\| | | | | \\ \\ / / |  _| | | | |\n |  _ <| |___ ___) | |_| | |__\\ V /  | |___| |_| |\n |_| \\_\\_____|____/ \\___/|_____\\_/   |_____|____/ "
    : tier==='partial'
    ? "   ____  ___ ____ _____   ___ ___ _   _ ___ \n  |  _ \\|_ _/ ___|_   _| / _ \\ | _ \\ | | | __|\n  | |_) || | |     | |  | (_) ||   /_| |_| _| \n  |____/|___\\____| |_|   \\___/ |_|_\\\\___/|___|"
    : "  _____  _    ___ _    _   _ ____  _____ \n |  ___|/ \\  |_ _| |  | | | |  _ \\| ____|\n | |_  / _ \\  | || |  | | | | |_) |  _|  \n |  _|/ ___ \\ | || |__| |_| |  _ <| |___ \n |_| /_/   \\_\\___|_____\\___/|_| \\_\\_____|";

  const verdict = score===max?"Vollständig gelöst. Die Mathearbeit findet pünktlich statt. Genau dafür gibt es Netzint."
    : score===4?"Fast perfekt. Mit ein bisschen mehr Sorgfalt wärst du durchgekommen."
    : score===3?"Knapp – das Schulnetz läuft, aber der Lehrer schaut komisch."
    : score===2?"Kollege musste eingreifen. Trotzdem: gut mitgespielt."
    : "Diagnose dauert zu lange – die Klausur wird verschoben. Probier's nochmal.";

  const code = makeCode(score);
  screen.innerHTML='';
  const node = el(`
    <div class="result ${tier==='ok'?'':tier} fade-in">
      <div class="result-head">
        <span>INCIDENT · ${tier==='ok'?'RESOLVED':'CLOSED'}</span>
        <span>${ticket.id}</span>
      </div>
      <div class="result-body">
        <pre class="ascii">${ascii}</pre>
        <h2>${tier==='ok'?'Alle Systeme grün.':tier==='partial'?'Service teilweise wiederhergestellt.':'Mathearbeit verschoben.'}</h2>
        <p class="verdict">${verdict}</p>
        <div class="stats">
          <div class="stat ${tier}"><span class="v">${score}<span style="font-size:13px;color:var(--muted)">/${max}</span></span><span class="l">Score</span></div>
          <div class="stat"><span class="v">${fmtTime(elapsed)}</span><span class="l">Resolve-Time</span></div>
          <div class="stat ${state.sla>0?'ok':'err'}"><span class="v">${state.sla>0?'OK':'BREACH'}</span><span class="l">SLA</span></div>
        </div>
        <div class="reveal">
          <span class="label">// CLIFFHANGER · AUFLÖSUNG</span>
          07:55 Uhr, Schulnetz fällt aus → Ticket bei Netzint → Servicedesk übernimmt → Diagnose, Lösung. Schule schreibt ihre Mathearbeit. <strong>Genau dafür gibt es uns.</strong>
        </div>
        <div class="code-box">
          <div class="clabel">DEIN CODE FÜR CARLO</div>
          <div class="code">${code}</div>
        </div>
        <p style="text-align:center;color:var(--muted);font-size:11px;margin-top:10px;line-height:1.5">
          Zeig Carlo deinen Code nach dem Vortrag.<br>Wer ${max}/${max} hat, gewinnt.
        </p>
        <div class="actions">
          <button class="btn ghost" id="again">↻ NOCHMAL</button>
        </div>
      </div>
    </div>
  `);
  screen.appendChild(node);
  node.querySelector('#again').onclick = ()=>{
    state.step=0; state.score=0; state.log=[]; state.sla=300;
    state.termHistory=[];
    state.nodes.forEach(n=>{ n.status = (n.id==='ad'?'fail':'ok'); });
    $('#slaClock').classList.remove('crit','ok');
    renderBoot();
  };
}

renderBoot();
